<!DOCTYPE html>

<style>
:root{--bg:#0a0e14;--bg2:#11161d;--text:#e6e8eb;--muted:#7d8590;--border:#1f2630;--accent:#14b8a6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;}
.navbtn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);width:100%;text-align:left;font-size:13px;}
.navbtn:hover{background:var(--bg2);color:var(--text);}
.navbtn.active{background:var(--accent);color:#fff;}
.pill{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn.danger{color:#ef4444;border-color:#ef4444;background:transparent;border:1px solid #ef4444;}
.iconbtn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 7px;font-size:12px;color:var(--text);cursor:pointer;}
.iconbtn:hover{background:var(--bg);}
.iconbtn.danger{border-color:#ef4444;color:#ef4444;}
.subtab{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12.5px;margin-right:6px;}

.postit{border-radius:8px;padding:14px;min-height:130px;position:relative;box-shadow:0 4px 10px rgba(0,0,0,.15);font-size:13px;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.barwrap{height:6px;background:var(--border);border-radius:3px;}
.barfill{height:6px;border-radius:3px;background:var(--accent);}
h2{margin-bottom:16px;font-weight:700;}
h4.label{margin-bottom:10px;color:var(--muted);font-weight:600;font-size:12px;letter-spacing:.5px;}
table.simple{border-collapse:collapse;width:100%;}
table.simple td{border:1px solid var(--border);padding:4px;}
::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.sidebar{width:230px;border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;}

/* VERSÃO OFFLINE — usa localStorage. Sem prompt()/confirm()/alert() (bloqueados em iframes sandboxed). */
const storage = {
  async get(key){ try{ const v=localStorage.getItem(key); return v!==null? {key,value:v} : null; }catch(e){ return null; } },
  async set(key,value){ try{ localStorage.setItem(key,value); return {key,value}; }catch(e){ return null; } }
};

function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtDur(sec){ const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60); return h===0?`${m}m`:`${h}h${String(m).padStart(2,"0")}m`; }
function todayISO(off=0){ const d=new Date(); d.setDate(d.getDate()+off); return d.toISOString().slice(0,10); }
function dayLabel(iso){ const d=new Date(iso+"T00:00:00"); return d.toLocaleDateString("pt-BR",{weekday:"short"}).replace(".",""); }
function buildDisc(nome,peso,assuntos){ return {id:uid(),nome,peso,custom:false,assuntos:assuntos.map(a=>({id:uid(),nome:a,custom:false}))}; }
function reviewCard(card,rating){
  let {intervalo,easeFactor,repeticoes}=card; easeFactor=easeFactor||2.5;
  if(rating==="errei"){ repeticoes=0; intervalo=0; easeFactor=Math.max(1.3,easeFactor-0.2); }
  else{
    repeticoes=(repeticoes||0)+1;
    if(rating==="dificil"){ intervalo=Math.max(1,Math.round((intervalo||1)*1.2)); easeFactor=Math.max(1.3,easeFactor-0.15); }
    else if(rating==="bom"){ intervalo = repeticoes===1?1:Math.round((intervalo||1)*easeFactor); }
    else if(rating==="facil"){ intervalo = repeticoes===1?4:Math.round((intervalo||1)*easeFactor*1.3); easeFactor+=0.15; }
  }
  return {intervalo,easeFactor,repeticoes,proximaRevisao:todayISO(rating==="errei"?0:intervalo),ultimaRevisao:todayISO(),status: intervalo>=21?"madura":repeticoes>0?"aprendendo":"nova"};
}

/* ============ GLOBAL APP STATE ============ */
let AUTH=null, S=null, CUR_USER=null;
let UI={section:"dashboard", openConcurso:{}, openDisc:{}, openCaderno:null, openPostit:null,
        questoesTab:"questoes", jurisTab:"jurisprudencia", notesTab:"cadernos", mapaConcurso:null,
        fcFilter:"", fcReview:null, timerRunning:false, timerElapsed:0,
        timerSel:{concursoId:"",disciplinaId:"",assuntoId:"",tipo:"teoria"}, loginSelectedUser:null,
        editing:null, confirmDelete:null, metasTab:"semanal", accountEditing:false};
let timerInterval=null;
let saveTimeout=null;

function storageKey(){ return STORAGE_PREFIX+CUR_USER; }
async function loadAuth(){
  const fallback={users:[{id:"u1",nome:"Usuário 1",senha:null},{id:"u2",nome:"Usuário 2",senha:null},{id:"u3",nome:"Usuário 3",senha:null}]};
  try{ const r=await storage.get(AUTH_KEY); AUTH=(r&&r.value)?JSON.parse(r.value):fallback; }catch(e){ AUTH=fallback; }
}
async function saveAuth(){ try{ await storage.set(AUTH_KEY,JSON.stringify(AUTH)); }catch(e){} }
async function loadState(){
  try{
    const r=await storage.get(storageKey());
    S = (r&&r.value)? Object.assign(defaultState(), JSON.parse(r.value)) : defaultState();
    if(!S.theme) S.theme=defaultState().theme;
    S.metas.forEach(m=>{ if(!m.tasks) m.tasks=[]; if(!m.periodo) m.periodo="semanal"; });
  }catch(e){ S=defaultState(); }
}
function scheduleSave(){ if(saveTimeout) clearTimeout(saveTimeout); saveTimeout=setTimeout(()=>{ storage.set(storageKey(),JSON.stringify(S)).catch(()=>{}); },350); }
function mutate(fn){ const r=fn(S); render(); scheduleSave(); return r; }
function mutateSilent(fn){ fn(S); scheduleSave(); }
function closeEdit(){ UI.editing=null; }

/* ============ HELPERS ============ */
function findConcurso(id){ return S.concursos.find(c=>c.id===id); }
function findDisc(concursoId,discId){ const c=findConcurso(concursoId); return c? c.disciplinas.find(d=>d.id===discId) : null; }
function findAssunto(concursoId,discId,assuntoId){ const c=findConcurso(concursoId); const d=c?c.disciplinas.find(x=>x.id===discId):null; const a=d?d.assuntos.find(x=>x.id===assuntoId):null; return {c,d,a}; }
function isDark(){ return S.theme.mode==="dark"; }
function bgColor(){ return S.theme.customBg || (isDark()?"#0a0e14":"#f7f8fa"); }
function applyTheme(){
  const r=document.documentElement.style;
  const dark=isDark();
  r.setProperty("--bg", bgColor());
  r.setProperty("--bg2", dark?"#11161d":"#ffffff");
  r.setProperty("--text", dark?"#e6e8eb":"#1a1d21");
  r.setProperty("--muted", dark?"#7d8590":"#6b7280");
  r.setProperty("--border", dark?"#1f2630":"#e5e7eb");
  r.setProperty("--accent", S.theme.accent);
  document.body.style.background="var(--bg)"; document.body.style.color="var(--text)";
}
function selectOptions(arr,getId,getLabel,selected){ return arr.map(x=>`<option value="${esc(getId(x))}" ${getId(x)===selected?"selected":""}>${esc(getLabel(x))}</option>`).join(""); }
function concursoOptions(selected){ return `<option value="">Concurso...</option>`+selectOptions(S.concursos,c=>c.id,c=>c.nome,selected); }
function discOptions(concursoId,selected){ const c=findConcurso(concursoId); if(!c) return `<option value="">Disciplina...</option>`; return `<option value="">Disciplina...</option>`+selectOptions(c.disciplinas,d=>d.id,d=>d.nome,selected); }

/* ============ SYNC: CICLO <-> TEMPO ============ */
function garantirCicloItem(concursoId,disciplinaId){
  const cc=findConcurso(concursoId); if(!cc) return null;
  const d=cc.disciplinas.find(x=>x.id===disciplinaId); if(!d) return null;
  let ci=S.ciclo.find(c=>c.concursoId===concursoId&&c.disciplinaId===disciplinaId);
  if(ci) return ci;
  const existing=S.ciclo.filter(c=>c.concursoId===concursoId);
  const idsAtuais=existing.map(c=>c.disciplinaId);
  const HORAS=(S.horasSemanais||20)*60;
  const totalW=[...idsAtuais,disciplinaId].reduce((s,id)=>{ const dd=cc.disciplinas.find(x=>x.id===id); return s+(dd?PESO_W[dd.peso]:0); },0);
  existing.forEach(c=>{ const dd=cc.disciplinas.find(x=>x.id===c.disciplinaId); if(dd&&totalW>0) c.tempoPrevisto=Math.round((PESO_W[dd.peso]/totalW)*HORAS); });
  const ordem=existing.length+1;
  ci={id:uid(),concursoId,disciplinaId,ordem,tempoPrevisto: totalW>0? Math.round((PESO_W[d.peso]/totalW)*HORAS): HORAS,tempoExecutado:0,status:"não iniciado"};
  S.ciclo.push(ci);
  return ci;
}
function applyCicloDelta(concursoId,disciplinaId,deltaMin){
  if(!concursoId||!disciplinaId||!deltaMin) return;
  let ci = deltaMin>0 ? garantirCicloItem(concursoId,disciplinaId) : S.ciclo.find(c=>c.concursoId===concursoId&&c.disciplinaId===disciplinaId);
  if(!ci) return;
  ci.tempoExecutado=Math.max(0,(ci.tempoExecutado||0)+deltaMin);
  ci.status = ci.tempoExecutado<=0 ? "não iniciado" : ci.tempoExecutado>=ci.tempoPrevisto ? "concluído" : "em andamento";
}
function applyEstudoEffects(sel,durSec){
  applyCicloDelta(sel.concursoId,sel.disciplinaId,Math.round(durSec/60));
  if(sel.tipo==="teoria"&&sel.assuntoId){
    const exists=S.revisoes.find(r=>r.assuntoId===sel.assuntoId&&r.status!=="concluída"&&r.intervaloIdx===0);
    if(!exists) S.revisoes.push({id:uid(),concursoId:sel.concursoId,disciplinaId:sel.disciplinaId,assuntoId:sel.assuntoId,intervaloIdx:0,dataPrevista:todayISO(REV_INTERVALS[0].d),status:"pendente"});
  }
}

/* ============ ALGORITMOS DE CICLO ============ */
function gerarCiclo(concursoId){
  const c=findConcurso(concursoId); if(!c) return;
  const ord=[...c.disciplinas].sort((a,b)=>PESO_W[b.peso]-PESO_W[a.peso]);
  const top5=ord.slice(0,5);
  const totalW=top5.reduce((s,d)=>s+PESO_W[d.peso],0);
  const HORAS=(S.horasSemanais||20)*60;
  S.ciclo=S.ciclo.filter(ci=>ci.concursoId!==concursoId);
  top5.forEach((d,idx)=>{ const min=Math.round((PESO_W[d.peso]/totalW)*HORAS); S.ciclo.push({id:uid(),concursoId,disciplinaId:d.id,ordem:idx+1,tempoPrevisto:min,tempoExecutado:0,status:"não iniciado"}); });
}
function adicionarDisciplinaCiclo(concursoId,discId){
  const cc=findConcurso(concursoId); if(!cc) return;
  if(S.ciclo.find(ci=>ci.concursoId===concursoId&&ci.disciplinaId===discId)) return;
  const idsAtuais=S.ciclo.filter(ci=>ci.concursoId===concursoId).map(ci=>ci.disciplinaId);
  const todasIds=[...idsAtuais,discId];
  const HORAS=(S.horasSemanais||20)*60;
  const totalW=todasIds.reduce((sum,id)=>{ const d=cc.disciplinas.find(x=>x.id===id); return sum+(d?PESO_W[d.peso]:0); },0);
  S.ciclo.forEach(ci=>{ if(ci.concursoId===concursoId){ const d=cc.disciplinas.find(x=>x.id===ci.disciplinaId); if(d) ci.tempoPrevisto=Math.round((PESO_W[d.peso]/totalW)*HORAS); } });
  const novaDisc=cc.disciplinas.find(x=>x.id===discId); if(!novaDisc) return;
  const ordem=S.ciclo.filter(ci=>ci.concursoId===concursoId).length+1;
  S.ciclo.push({id:uid(),concursoId,disciplinaId:discId,ordem,tempoPrevisto:Math.round((PESO_W[novaDisc.peso]/totalW)*HORAS),tempoExecutado:0,status:"não iniciado"});
}
function recalcularHoras(novo){
  S.horasSemanais=novo;
  const grupos={};
  S.ciclo.forEach(ci=>{ (grupos[ci.concursoId]=grupos[ci.concursoId]||[]).push(ci); });
  Object.entries(grupos).forEach(([concursoId,items])=>{
    const cc=findConcurso(concursoId); if(!cc) return;
    const totalW=items.reduce((sum,ci)=>{ const d=cc.disciplinas.find(x=>x.id===ci.disciplinaId); return sum+(d?PESO_W[d.peso]:0); },0);
    items.forEach(ci=>{ const d=cc.disciplinas.find(x=>x.id===ci.disciplinaId); if(d&&totalW>0) ci.tempoPrevisto=Math.round((PESO_W[d.peso]/totalW)*novo*60); });
  });
}
function marcarRevisaoConcluida(rid){
  const r=S.revisoes.find(x=>x.id===rid); if(!r) return;
  r.status="concluída";
  if(r.origem==="desempenho") return;
  const nextIdx=r.intervaloIdx+1;
  if(nextIdx<REV_INTERVALS.length) S.revisoes.push({id:uid(),concursoId:r.concursoId,disciplinaId:r.disciplinaId,assuntoId:r.assuntoId,intervaloIdx:nextIdx,dataPrevista:todayISO(REV_INTERVALS[nextIdx].d),status:"pendente"});
}
function checkDesempenhoRevisao(concursoId,discId){
  const qs=S.questoes.filter(q=>q.concursoId===concursoId&&q.disciplinaId===discId);
  const ac=qs.reduce((a,q)=>a+q.acertos,0), er=qs.reduce((a,q)=>a+q.erros,0), total=ac+er;
  if(total===0) return false;
  const pct=Math.round((ac/total)*100);
  const existing=S.revisoes.find(r=>r.origem==="desempenho"&&r.concursoId===concursoId&&r.disciplinaId===discId&&r.status==="pendente");
  if(pct<80){ if(existing) existing.percentual=pct; else S.revisoes.push({id:uid(),concursoId,disciplinaId:discId,assuntoId:null,origem:"desempenho",percentual:pct,dataPrevista:todayISO(),status:"pendente"}); return true; }
  else if(existing){ existing.status="concluída"; }
  return false;
}
function calcDisciplinaScore(concursoId,discId){
  const ci=S.ciclo.find(c=>c.concursoId===concursoId&&c.disciplinaId===discId);
  const editalPct = ci&&ci.tempoPrevisto? Math.min(100,(ci.tempoExecutado/ci.tempoPrevisto)*100) : null;
  const qs=S.questoes.filter(q=>q.concursoId===concursoId&&q.disciplinaId===discId);
  const ac=qs.reduce((s,q)=>s+q.acertos,0), er=qs.reduce((s,q)=>s+q.erros,0);
  const accPct=(ac+er)>0? (ac/(ac+er))*100 : null;
  const discs=S.discursivas.filter(d=>d.concursoId===concursoId&&d.disciplinaId===discId);
  const discPct=discs.length? (discs.reduce((s,d)=>s+d.nota,0)/discs.length)*10 : null;
  const revPend=S.revisoes.filter(r=>r.concursoId===concursoId&&r.disciplinaId===discId&&r.status==="pendente").length;
  const vals=[editalPct,accPct,discPct].filter(v=>v!==null);
  const score=vals.length? Math.round(vals.reduce((s,v)=>s+v,0)/vals.length) : 0;
  return {editalPct,accPct,discPct,revPend,score};
}

/* ============ CONCURSOS / DISCIPLINAS / ASSUNTOS — exclusão real (sem confirm) ============ */
function deleteConcursoNow(concursoId){
  S.concursos=S.concursos.filter(c=>c.id!==concursoId);
  const rm=x=>x.concursoId!==concursoId;
  S.ciclo=S.ciclo.filter(rm); S.registros=S.registros.filter(rm); S.revisoes=S.revisoes.filter(rm);
  S.questoes=S.questoes.filter(rm); S.simulados=S.simulados.filter(rm); S.discursivas=S.discursivas.filter(rm);
  S.jurisprudencia=S.jurisprudencia.filter(rm); S.legislacao=S.legislacao.filter(rm); S.flashcards=S.flashcards.filter(rm);
  UI.confirmDelete=null; render(); scheduleSave();
}
function deleteDisciplinaNow(concursoId,discId){
  const cc=findConcurso(concursoId); if(cc) cc.disciplinas=cc.disciplinas.filter(d=>d.id!==discId);
  const rm=x=>!(x.concursoId===concursoId&&x.disciplinaId===discId);
  S.ciclo=S.ciclo.filter(rm); S.registros=S.registros.filter(rm); S.revisoes=S.revisoes.filter(rm);
  S.questoes=S.questoes.filter(rm); S.simulados=S.simulados.filter(rm); S.discursivas=S.discursivas.filter(rm);
  S.jurisprudencia=S.jurisprudencia.filter(rm); S.legislacao=S.legislacao.filter(rm); S.flashcards=S.flashcards.filter(rm);
  UI.confirmDelete=null; render(); scheduleSave();
}
function deleteAssuntoNow(concursoId,discId,assuntoId){
  const d=findDisc(concursoId,discId); if(d) d.assuntos=d.assuntos.filter(a=>a.id!==assuntoId);
  S.revisoes=S.revisoes.filter(r=>r.assuntoId!==assuntoId);
  S.flashcards=S.flashcards.filter(f=>f.assuntoId!==assuntoId);
  S.registros.forEach(r=>{ if(r.assuntoId===assuntoId) r.assuntoId=null; });
  S.questoes.forEach(q=>{ if(q.assuntoId===assuntoId) q.assuntoId=null; });
  S.discursivas.forEach(ds=>{ if(ds.assuntoId===assuntoId) ds.assuntoId=null; });
  UI.confirmDelete=null; render(); scheduleSave();
}
function deleteRegistroNow(id){
  const r=S.registros.find(x=>x.id===id); if(!r) return;
  applyCicloDelta(r.concursoId,r.disciplinaId,-Math.round(r.duracao/60));
  S.registros=S.registros.filter(x=>x.id!==id);
  UI.confirmDelete=null; render(); scheduleSave();
}

function loginAction(act,el){
  if(act==="login-pick"){ UI.loginSelectedUser=el.dataset.id; UI.confirmDelete=null; renderLogin(); }
  else if(act==="login-back"){ UI.loginSelectedUser=null; renderLogin(); }
  else if(act==="arm-forgot"){ UI.confirmDelete="forgot:"+el.dataset.id; renderLogin(); }
  else if(act==="cancel-del"){ UI.confirmDelete=null; renderLogin(); }
  else if(act==="confirm-forgot"){ const u=AUTH.users.find(x=>x.id===el.dataset.id); u.senha=null; UI.confirmDelete=null; saveAuth(); renderLogin(); }
  else if(act==="login-submit"){
    const sel=AUTH.users.find(u=>u.id===UI.loginSelectedUser);
    const pwd=document.getElementById("login-pwd").value;
    if(!sel.senha){
      const pwd2=document.getElementById("login-pwd2").value;
      if(pwd.length<4){ document.getElementById("login-err").textContent="A senha deve ter pelo menos 4 caracteres."; return; }
      if(pwd!==pwd2){ document.getElementById("login-err").textContent="As senhas não coincidem."; return; }
      sel.senha=pwd; saveAuth();
      startSession(sel.id);
    } else {
      if(pwd===sel.senha){ startSession(sel.id); }
      else document.getElementById("login-err").textContent="Senha incorreta.";
    }
  }
}

function saveRegistro(id){
  const r=S.registros.find(x=>x.id===id); if(!r) return;
  const cid=document.getElementById("er-concurso-"+id).value, did=document.getElementById("er-disc-"+id).value, aid=document.getElementById("er-assunto-"+id).value||null;
  const tipo=document.getElementById("er-tipo-"+id).value, data=document.getElementById("er-data-"+id).value, min=Math.max(1,Number(document.getElementById("er-min-"+id).value)||1);

  if(cid===r.concursoId && did===r.disciplinaId){ applyCicloDelta(cid,did,min-oldMin); }
  else { applyCicloDelta(r.concursoId,r.disciplinaId,-oldMin); applyCicloDelta(cid,did,min); }
  r.concursoId=cid; r.disciplinaId=did; r.assuntoId=aid; r.tipo=tipo; r.duracao=min*60; r.ts=data+"T12:00:00.000Z";
  UI.editing=null; render(); scheduleSave();
}

/* ---- Mapa de Aprovação ---- */
function renderMapa(){
  const cid=UI.mapaConcurso || S.concursos[0]?.id;
  const c=findConcurso(cid);
  if(!c) return `<h2>Mapa de Aprovação</h2><div class="card">Cadastre um concurso primeiro.</div>`;
  const rows=c.disciplinas.map(d=>({d,...calcDisciplinaScore(c.id,d.id)}));
  const totalPeso=rows.reduce((s,r)=>s+PESO_W[r.d.peso],0);
  const geral= rows.length? Math.round(rows.reduce((s,r)=>s+r.score*PESO_W[r.d.peso],0)/totalPeso) : 0;
  return `<h2>Mapa de Aprovação</h2>
  <div style="margin-bottom:18px;">${S.concursos.map(cc=>`<button class="subtab ${cid===cc.id?'active':''}" data-act="mapa-concurso" data-id="${cc.id}">${esc(cc.nome)}</button>`).join("")}</div>
  <div class="card" style="text-align:center;margin-bottom:14px;"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Prontidão geral estimada</div><div style="font-size:40px;font-weight:700;color:var(--accent);">${geral}%</div></div>
  <div style="display:grid;gap:8px;">
    ${rows.map(r=>`<div class="card"><div class="row" style="justify-content:space-between;margin-bottom:8px;"><strong style="font-size:13px;">${esc(r.d.nome)}</strong><span class="pill" style="background:${pesoBg(r.d.peso)};color:${pesoColor(r.d.peso)};">${r.d.peso}</span></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;font-size:11.5px;color:var(--muted);margin-bottom:6px;">
      <div>Edital: <strong style="color:var(--text);">${r.editalPct!==null?Math.round(r.editalPct)+"%":"—"}</strong></div>
      <div>Acerto questões: <strong style="color:var(--text);">${r.accPct!==null?Math.round(r.accPct)+"%":"—"}</strong></div>
      <div>Discursivas: <strong style="color:var(--text);">${r.discPct!==null?Math.round(r.discPct)+"%":"—"}</strong></div>
      <div>Revisões pend.: <strong style="color:var(--text);">${r.revPend}</strong></div>
    </div><div class="barwrap"><div class="barfill" style="width:${r.score}%;"></div></div></div>`).join("")}
  </div>`;
}

function renderFlashcardReview(){
  const {queue,idx}=UI.fcReview;
  if(idx>=queue.length){
    return `<div class="card" style="text-align:center;padding:40px;"><div style="font-size:32px;margin-bottom:10px;">🎉</div><h3 style="margin-bottom:8px;">Sessão concluída!</h3><div style="color:var(--muted);font-size:13px;margin-bottom:16px;">Você revisou ${queue.length} flashcard(s) hoje.</div><button class="btn" data-act="fc-exit">Voltar</button></div>`;
  }
  const card=S.flashcards.find(f=>f.id===queue[idx]); if(!card) return "";
  const {c,d,a}=findAssunto(card.concursoId,card.disciplinaId,card.assuntoId);
  const flipped=UI.fcReview.flipped;
  return `<div class="row" style="justify-content:space-between;margin-bottom:12px;font-size:12px;color:var(--muted);"><span>${esc(d?.nome)}${a?` · ${esc(a.nome)}`:""} · ${esc(c?.nome)}</span><span>${idx+1} / ${queue.length}</span></div>
  <div class="card" style="min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;cursor:${!flipped?'pointer':'default'};" ${!flipped?`data-act="fc-flip"`:""}>
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;">${flipped?"RESPOSTA":"PERGUNTA (clique para revelar)"}</div>

    ${flipped&&card.tabela?`<table class="simple" style="margin-top:14px;font-size:12px;">${card.tabela.map(row=>`<tr>${row.map(cell=>`<td>${esc(cell)}</td>`).join("")}</tr>`).join("")}</table>`:""}
  </div>
  ${!flipped?`<div class="row" style="justify-content:center;margin-top:16px;"><button class="btn" data-act="fc-flip">Mostrar resposta</button></div>`:
  `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;">
    <button class="btn" style="background:#ef4444;justify-content:center;" data-act="fc-grade" data-rating="errei">Errei</button>
    <button class="btn" style="background:#f59e0b;justify-content:center;" data-act="fc-grade" data-rating="dificil">Difícil</button>
    <button class="btn" style="background:#22c55e;justify-content:center;" data-act="fc-grade" data-rating="bom">Bom</button>
    <button class="btn" style="background:var(--accent);justify-content:center;" data-act="fc-grade" data-rating="facil">Fácil</button>
  </div>`}
  <div style="text-align:center;margin-top:14px;"><button class="btn ghost" data-act="fc-exit">Encerrar sessão</button></div>`;

function colorPickerHtml(value,group,id){
  return `<div class="row" style="gap:5px;">${TEXT_COLORS.map(c=>`<div class="colordot" data-act="colorpick" data-group="${group}" data-id="${id}" data-color="${c}" style="width:18px;height:18px;background:${c};border:${value===c?'2px solid var(--accent)':'1px solid var(--border)'};"></div>`).join("")}
  <input type="color" value="${value}" data-act="colorpick-custom" data-group="${group}" data-id="${id}" style="width:22px;height:18px;padding:0;">`;

function tableEditorHtml(tabela,group,id){
  return `<div style="overflow-x:auto;margin-top:8px;"><table class="simple">${tabela.map((row,r)=>`<tr>${row.map((cell,c2)=>`<td><input data-act="table-cell" data-group="${group}" data-id="${id}" data-r="${r}" data-c="${c2}" value="${esc(cell)}" style="border:none;background:transparent;padding:4px;font-size:12px;width:100%;"></td>`).join("")}<td><button class="btn ghost" style="padding:3px;" data-act="table-delrow" data-group="${group}" data-id="${id}" data-r="${r}">🗑</button></td></tr>`).join("")}

  <div class="row" style="margin-top:6px;"><button class="btn ghost" data-act="table-addrow" data-group="${group}" data-id="${id}">➕ Linha</button><button class="btn ghost" data-act="table-addcol" data-group="${group}" data-id="${id}">➕ Coluna</button></div></div>`;
}

/* ---- Metas (abas diária/semanal/mensal + checklist + edição inline) ---- */
function metaSecs(periodo){ return periodo==="diaria"? secsToday() : periodo==="mensal"? secsMonth() : secsWeek(); }
function metaLabel(periodo){ return periodo==="diaria"? "hoje" : periodo==="mensal"? "este mês" : "esta semana"; }
function renderMetas(){
  const tab=UI.metasTab;
  const metasFiltradas=S.metas.filter(m=>(m.periodo||"semanal")===tab);
  return `<h2>Metas</h2>
  <div style="margin-bottom:18px;">
    <button class="subtab ${tab==='diaria'?'active':''}" data-act="metastab" data-tab="diaria">Diárias</button>
    <button class="subtab ${tab==='semanal'?'active':''}" data-act="metastab" data-tab="semanal">Semanais</button>
    <button class="subtab ${tab==='mensal'?'active':''}" data-act="metastab" data-tab="mensal">Mensais</button>
  </div>
  <div style="display:grid;gap:10px;">
  ${metasFiltradas.map(m=>{
    const horas=metaSecs(m.periodo)/3600; const pct=Math.min(100,Math.round((horas/m.metaHoras)*100)); const tasks=m.tasks||[]; const doneCt=tasks.filter(t=>t.done).length;
    const key="meta:"+m.id;
    if(UI.editing===key){
      return `<div class="card editbox">
        <div class="row"><input id="em-titulo-${m.id}" value="${esc(m.titulo)}" style="flex:1;"><input id="em-horas-${m.id}" type="number" value="${m.metaHoras}" style="width:80px;">
        <select id="em-periodo-${m.id}"><option value="diaria" ${m.periodo==="diaria"?"selected":""}>Diária</option><option value="semanal" ${m.periodo==="semanal"?"selected":""}>Semanal</option><option value="mensal" ${m.periodo==="mensal"?"selected":""}>Mensal</option></select>
        <button class="btn" data-act="save-meta" data-id="${m.id}">💾 Salvar</button><button class="btn ghost" data-act="toggle-edit" data-key="${key}">Cancelar</button></div>
      </div>`;
    }
    return `<div class="card">
    <div class="row" style="justify-content:space-between;margin-bottom:8px;"><strong style="font-size:13px;">${esc(m.titulo)}</strong>
      <div class="row">${editBtn(key)}${delBtn(key)}</div></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">${horas.toFixed(1)}h de ${m.metaHoras}h ${metaLabel(m.periodo)} (${pct}%)</div>
    <div class="barwrap" style="margin-bottom:12px;"><div class="barfill" style="width:${pct}%;"></div></div>
    <h4 class="label" style="margin-bottom:6px;">CHECKLIST ${tasks.length?`(${doneCt}/${tasks.length})`:""}</h4>
    ${tasks.map(t=>`<div class="checkrow ${t.done?'done':''}">
      <input type="checkbox" data-act="toggle-task" data-mid="${m.id}" data-tid="${t.id}" ${t.done?"checked":""}>
      <span style="font-size:13px;flex:1;">${esc(t.texto)}</span>
      <button class="iconbtn" data-act="arm-del" data-key="task:${m.id}:${t.id}">🗑</button>
    </div>`).join("")}
    <div class="row" style="margin-top:8px;"><input id="task-input-${m.id}" placeholder="Nova tarefa..." style="flex:1;"><button class="btn ghost" data-act="add-task" data-mid="${m.id}">➕</button></div>
    </div>`; }).join("")}
  ${metasFiltradas.length===0?`<div class="card" style="color:var(--muted);">Nenhuma meta ${tab==='diaria'?'diária':tab==='mensal'?'mensal':'semanal'} ainda.</div>`:""}
  </div>
  <div class="card row" style="margin-top:10px;"><input id="meta-titulo" placeholder="Nova meta..." style="flex:1;"><input id="meta-horas" type="number" value="${tab==='diaria'?2:tab==='mensal'?80:10}" style="width:80px;"><button class="btn" data-act="add-meta">➕ Adicionar meta ${tab==='diaria'?'diária':tab==='mensal'?'mensal':'semanal'}</button></div>`;
}

/* ============ EVENT DELEGATION ============ */
document.addEventListener("click",(e)=>{
  if(!S){
    const lb=e.target.closest("[data-act]"); if(lb && (lb.dataset.act.startsWith("login")||["arm-forgot","confirm-forgot","cancel-del"].includes(lb.dataset.act))) loginAction(lb.dataset.act,lb);
    return;
  }
  const t=e.target.closest("[data-act]"); if(!t) return;
  const act=t.dataset.act, id=t.dataset.id;
  switch(act){
    case "nav": UI.section=t.dataset.section; UI.editing=null; UI.confirmDelete=null; render(); break;
    case "lock": stopTimerInterval(); S=null; CUR_USER=null; UI.loginSelectedUser=null; renderLogin(); break;
    case "toggle-edit": UI.editing = UI.editing===t.dataset.key? null : t.dataset.key; renderSection(); break;
    case "arm-del": UI.confirmDelete=t.dataset.key; renderSection(); break;
    case "cancel-del": UI.confirmDelete=null; renderSection(); break;
    case "confirm-del": { const key=t.dataset.key; if(key==="reset-data"){ mutate(()=>{ Object.assign(S,defaultState()); }); UI.confirmDelete=null; } else performDelete(key); break; }
    case "toggle-concurso": UI.openConcurso[id]=!UI.openConcurso[id]; renderSection(); break;
    case "toggle-disc": UI.openDisc[id]=!UI.openDisc[id]; renderSection(); break;
    case "gerar-ciclo": gerarCiclo(id); UI.section="ciclo"; mutate(()=>{}); break;
    case "save-concurso": { const c=findConcurso(id); if(c){ c.nome=document.getElementById("ec-nome-"+id).value.trim()||c.nome; c.cor=document.getElementById("ec-cor-"+id).value; } UI.editing=null; render(); scheduleSave(); break; }
    case "save-disc": { const d=findDisc(t.dataset.cid,t.dataset.did); if(d){ d.nome=document.getElementById("ed-nome-"+t.dataset.did).value.trim()||d.nome; d.peso=document.getElementById("ed-peso-"+t.dataset.did).value; } UI.editing=null; render(); scheduleSave(); break; }
    case "save-assunto": { const d=findDisc(t.dataset.cid,t.dataset.did); const a=d?.assuntos.find(x=>x.id===t.dataset.aid); if(a){ a.nome=document.getElementById("ea-nome-"+t.dataset.aid).value.trim()||a.nome; } UI.editing=null; render(); scheduleSave(); break; }
    case "add-disc-inline": { const cid=t.dataset.cid, nome=document.getElementById("add-disc-inline-"+cid).value.trim(), peso=document.getElementById("add-disc-peso-"+cid).value; if(nome) mutate(()=>{ const c=findConcurso(cid); c.disciplinas.push({id:uid(),nome,peso,custom:true,assuntos:[]}); }); break; }
    case "add-assunto-inline": { const did=t.dataset.did, nome=document.getElementById("add-assunto-inline-"+did).value.trim(); if(nome) mutate(()=>{ const d=findDisc(t.dataset.cid,did); d.assuntos.push({id:uid(),nome,custom:true}); }); break; }
    case "add-concurso": { const nome=document.getElementById("new-concurso-nome").value.trim(); if(nome) mutate(()=>{ S.concursos.push({id:uid(),nome,sigla:nome,cor:"#999",custom:true,disciplinas:[]}); }); break; }
    case "add-disciplina": { const cid=document.getElementById("cd-concurso").value, nome=document.getElementById("cd-disc-nome").value.trim(), peso=document.getElementById("cd-disc-peso").value;
      if(cid&&nome) mutate(()=>{ const c=findConcurso(cid); c.disciplinas.push({id:uid(),nome,peso,custom:true,assuntos:[]}); }); break; }
    case "add-assunto": { const cid=document.getElementById("ca-concurso").value, did=document.getElementById("ca-disc").value, nome=document.getElementById("ca-assunto-nome").value.trim();
      if(cid&&did&&nome) mutate(()=>{ const d=findDisc(cid,did); d.assuntos.push({id:uid(),nome,custom:true}); }); break; }
    case "add-ciclo-disc": { const cid=document.getElementById("ciclo-add-concurso").value, did=document.getElementById("ciclo-add-disc").value; if(cid&&did) mutate(()=>{ adicionarDisciplinaCiclo(cid,did); }); break; }
    case "timer-start": { const sel=UI.timerSel; if(!sel.concursoId||!sel.disciplinaId) return; UI.timerElapsed=0; UI.timerRunning=true; startTimerInterval(); renderSection(); break; }
    case "timer-pause": UI.timerRunning=false; stopTimerInterval(); renderSection(); break;
    case "timer-resume": UI.timerRunning=true; startTimerInterval(); renderSection(); break;
    case "timer-stop": stopTimerStop(); break;
    case "save-registro": saveRegistro(id); break;
    case "add-registro-manual": addRegistroManual(); break;
    case "concluir-revisao": mutate(()=>{ marcarRevisaoConcluida(id); }); break;
    case "qtab": UI.questoesTab=t.dataset.tab; UI.editing=null; renderSection(); break;
    case "add-questao": { const cid=document.getElementById("q-concurso").value, did=document.getElementById("q-disc").value, aid=document.getElementById("q-assunto").value||null, banca=document.getElementById("q-banca").value, acertos=Number(document.getElementById("q-acertos").value)||0, erros=Number(document.getElementById("q-erros").value)||0;
      if(cid&&did){ let redir=false; mutate(()=>{ S.questoes.push({id:uid(),concursoId:cid,disciplinaId:did,assuntoId:aid,banca,acertos,erros,ts:new Date().toISOString()}); redir=checkDesempenhoRevisao(cid,did); }); if(redir){ UI.section="revisoes"; render(); } } break; }
    case "save-questao": { const q=S.questoes.find(x=>x.id===id); if(q){ q.concursoId=document.getElementById("eq-concurso-"+id).value; q.disciplinaId=document.getElementById("eq-disc-"+id).value; q.assuntoId=document.getElementById("eq-assunto-"+id).value||null; q.banca=document.getElementById("eq-banca-"+id).value; q.acertos=Math.max(0,Number(document.getElementById("eq-acertos-"+id).value)||0); q.erros=Math.max(0,Number(document.getElementById("eq-erros-"+id).value)||0); checkDesempenhoRevisao(q.concursoId,q.disciplinaId); } UI.editing=null; render(); scheduleSave(); break; }
    case "add-simulado": { const cid=document.getElementById("sm-concurso").value, did=document.getElementById("sm-disc").value||null, aid=document.getElementById("sm-assunto").value||null, nome=document.getElementById("sm-nome").value.trim(), total=Number(document.getElementById("sm-total").value)||0, acertos=Number(document.getElementById("sm-acertos").value)||0;
      if(cid&&nome) mutate(()=>{ S.simulados.push({id:uid(),concursoId:cid,disciplinaId:did,assuntoId:aid,nome,totalQuestoes:total,acertos,data:todayISO()}); }); break; }
    case "save-simulado": { const sm=S.simulados.find(x=>x.id===id); if(sm){ sm.concursoId=document.getElementById("esm-concurso-"+id).value; sm.disciplinaId=document.getElementById("esm-disc-"+id).value||null; sm.assuntoId=document.getElementById("esm-assunto-"+id).value||null; sm.nome=document.getElementById("esm-nome-"+id).value.trim()||sm.nome; sm.totalQuestoes=Math.max(0,Number(document.getElementById("esm-total-"+id).value)||0); sm.acertos=Math.max(0,Number(document.getElementById("esm-acertos-"+id).value)||0); } UI.editing=null; render(); scheduleSave(); break; }
    case "add-discursiva": { const cid=document.getElementById("ds-concurso").value, did=document.getElementById("ds-disc").value, aid=document.getElementById("ds-assunto").value||null, tema=document.getElementById("ds-tema").value.trim(), nota=Number(document.getElementById("ds-nota").value)||0;
      if(cid&&did&&tema) mutate(()=>{ S.discursivas.push({id:uid(),concursoId:cid,disciplinaId:did,assuntoId:aid,tema,nota,data:todayISO()}); }); break; }
    case "save-discursiva": { const ds=S.discursivas.find(x=>x.id===id); if(ds){ ds.concursoId=document.getElementById("eds-concurso-"+id).value; ds.disciplinaId=document.getElementById("eds-disc-"+id).value; ds.assuntoId=document.getElementById("eds-assunto-"+id).value||null; ds.tema=document.getElementById("eds-tema-"+id).value.trim()||ds.tema; ds.nota=Number(document.getElementById("eds-nota-"+id).value)||ds.nota; } UI.editing=null; render(); scheduleSave(); break; }
    case "jtab": UI.jurisTab=t.dataset.tab; UI.editing=null; renderSection(); break;
    case "add-juris": { const cid=document.getElementById("j-concurso").value, did=document.getElementById("j-disc").value, tribunal=document.getElementById("j-tribunal").value, tese=document.getElementById("j-tese").value.trim();
      if(cid&&did&&tese) mutate(()=>{ S.jurisprudencia.push({id:uid(),concursoId:cid,disciplinaId:did,tribunal,tese,data:todayISO()}); }); break; }
    case "save-juris": { const j=S.jurisprudencia.find(x=>x.id===id); if(j){ j.concursoId=document.getElementById("ej-concurso-"+id).value; j.disciplinaId=document.getElementById("ej-disc-"+id).value; j.tribunal=document.getElementById("ej-tribunal-"+id).value; j.tese=document.getElementById("ej-tese-"+id).value; } UI.editing=null; render(); scheduleSave(); break; }
    case "add-leg": { const cid=document.getElementById("l-concurso").value, did=document.getElementById("l-disc").value, norma=document.getElementById("l-norma").value.trim(), artigo=document.getElementById("l-artigo").value, resumo=document.getElementById("l-resumo").value;
      if(cid&&did&&norma) mutate(()=>{ S.legislacao.push({id:uid(),concursoId:cid,disciplinaId:did,norma,artigo,resumo}); }); break; }
    case "save-leg": { const l=S.legislacao.find(x=>x.id===id); if(l){ l.concursoId=document.getElementById("el-concurso-"+id).value; l.disciplinaId=document.getElementById("el-disc-"+id).value; l.norma=document.getElementById("el-norma-"+id).value; l.artigo=document.getElementById("el-artigo-"+id).value; l.resumo=document.getElementById("el-resumo-"+id).value; } UI.editing=null; render(); scheduleSave(); break; }
    case "mapa-concurso": UI.mapaConcurso=id; renderSection(); break;
    case "notestab": UI.notesTab=t.dataset.tab; renderSection(); break;
    case "add-caderno": { const cid=document.getElementById("cad-concurso").value, did=document.getElementById("cad-disc").value, titulo=document.getElementById("cad-titulo").value.trim();
      if(titulo) mutate(()=>{ S.cadernos.push({id:uid(),concursoId:cid,disciplinaId:did,titulo,conteudo:"",corTexto:"#e6e8eb",tabela:null,ts:new Date().toISOString()}); }); break; }
    case "toggle-caderno": UI.openCaderno = UI.openCaderno===id? null:id; renderSection(); break;
    case "toggle-tabela-caderno": mutate(()=>{ const c=S.cadernos.find(x=>x.id===id); c.tabela=c.tabela?null:blankTable(); }); break;
    case "pi-cor": UI.piCor=t.dataset.color; renderSection(); break;
    case "add-postit": { const texto=document.getElementById("pi-texto").value.trim(); if(texto) mutate(()=>{ S.postits.push({id:uid(),texto,cor:UI.piCor||POSTIT_COLORS[0],corTexto:UI.piCorTexto||"#2a2a2a",tabela:null,ts:new Date().toISOString()}); }); break; }
    case "toggle-postit": UI.openPostit = UI.openPostit===id? null:id; renderSection(); break;
    case "toggle-tabela-postit": mutate(()=>{ const p=S.postits.find(x=>x.id===id); p.tabela=p.tabela?null:blankTable(); }); break;
    case "fc-toggle-tabela": UI.fcTabela = UI.fcTabela? null: blankTable(); renderSection(); break;
    case "add-flashcard": { const cid=document.getElementById("fc-concurso").value, did=document.getElementById("fc-disc").value, aid=document.getElementById("fc-assunto").value||null, frente=document.getElementById("fc-frente").value.trim(), verso=document.getElementById("fc-verso").value.trim();
      if(cid&&did&&frente&&verso) mutate(()=>{ S.flashcards.push({id:uid(),concursoId:cid,disciplinaId:did,assuntoId:aid,frente,verso,corTexto:UI.fcCorTexto||"#e6e8eb",tabela:UI.fcTabela,intervalo:0,easeFactor:2.5,repeticoes:0,proximaRevisao:todayISO(),status:"nova"}); UI.fcTabela=null; }); break; }
    case "save-flashcard": { const f=S.flashcards.find(x=>x.id===id); if(f){ f.concursoId=document.getElementById("ef-concurso-"+id).value; f.disciplinaId=document.getElementById("ef-disc-"+id).value; f.assuntoId=document.getElementById("ef-assunto-"+id).value||null; f.frente=document.getElementById("ef-frente-"+id).value.trim()||f.frente; f.verso=document.getElementById("ef-verso-"+id).value.trim()||f.verso; } UI.editing=null; render(); scheduleSave(); break; }
    case "fc-start-review": { const filtered=S.flashcards.filter(f=>!UI.fcFilter||f.concursoId===UI.fcFilter); const due=filtered.filter(f=>f.proximaRevisao<=todayISO()); if(due.length) UI.fcReview={queue:due.map(f=>f.id),idx:0,flipped:false}; renderSection(); break; }
    case "fc-flip": UI.fcReview.flipped=true; renderSection(); break;
    case "fc-grade": { const rating=t.dataset.rating; const cardId=UI.fcReview.queue[UI.fcReview.idx]; mutateSilent(()=>{ const card=S.flashcards.find(f=>f.id===cardId); Object.assign(card,reviewCard(card,rating)); }); UI.fcReview.idx++; UI.fcReview.flipped=false; renderSection(); break; }
    case "fc-exit": UI.fcReview=null; renderSection(); break;
    case "metastab": UI.metasTab=t.dataset.tab; UI.editing=null; renderSection(); break;
    case "save-meta": { const m=S.metas.find(x=>x.id===id); if(m){ m.titulo=document.getElementById("em-titulo-"+id).value.trim()||m.titulo; m.metaHoras=Math.max(1,Number(document.getElementById("em-horas-"+id).value)||m.metaHoras); m.periodo=document.getElementById("em-periodo-"+id).value; } UI.editing=null; render(); scheduleSave(); break; }
    case "add-meta": { const titulo=document.getElementById("meta-titulo").value.trim(), horas=Number(document.getElementById("meta-horas").value)||10; if(titulo) mutate(()=>{ S.metas.push({id:uid(),titulo,metaHoras:horas,periodo:UI.metasTab,tasks:[]}); }); break; }
    case "add-task": { const mid=t.dataset.mid; const input=document.getElementById("task-input-"+mid); const texto=input.value.trim(); if(texto) mutate(()=>{ const m=S.metas.find(x=>x.id===mid); m.tasks=m.tasks||[]; m.tasks.push({id:uid(),texto,done:false}); }); break; }
    case "edit-account": UI.accountEditing=true; renderSection(); break;
    case "cancel-account": UI.accountEditing=false; renderSection(); break;
    case "save-account": { const u=AUTH.users.find(x=>x.id===CUR_USER); const novoNome=document.getElementById("acc-nome").value.trim(); const novaSenha=document.getElementById("acc-pwd").value; if(novoNome) u.nome=novoNome; if(novaSenha&&novaSenha.length>=4) u.senha=novaSenha; saveAuth(); UI.accountEditing=false; render(); break; }
    case "theme-mode": mutate(()=>{ S.theme.mode=t.dataset.mode; }); break;
    case "theme-accent": mutate(()=>{ S.theme.accent=t.dataset.color; }); break;
    case "theme-bg-reset": mutate(()=>{ S.theme.customBg=null; }); break;
    case "export-data": exportData(); break;
    case "table-addrow": tableOp(t,"addrow"); break;
    case "table-addcol": tableOp(t,"addcol"); break;
    case "table-delrow": tableOp(t,"delrow",Number(t.dataset.r)); break;
    case "table-delcol": tableOp(t,"delcol",Number(t.dataset.c)); break;
    case "colorpick": colorPickAction(t.dataset.group,t.dataset.id,t.dataset.color); break;
  }
});
document.addEventListener("change",(e)=>{
  if(!S) return;
  const t=e.target.closest("[data-act]"); if(!t) return;
  const act=t.dataset.act;
  if(act==="theme-accent-custom") mutate(()=>{ S.theme.accent=t.value; });
  else if(act==="theme-bg-custom") mutate(()=>{ S.theme.customBg=t.value; });
  else if(act==="colorpick-custom") colorPickAction(t.dataset.group,t.dataset.id,t.value);
  else if(act==="ca-concurso-change"){ document.getElementById("ca-disc").innerHTML=discOptions(t.value,""); }
  else if(act==="ciclo-concurso-change"){ document.getElementById("ciclo-add-disc").innerHTML=cicloDiscOptions(t.value); }
  else if(act==="t-concurso-change"){ UI.timerSel={concursoId:t.value,disciplinaId:"",assuntoId:"",tipo:UI.timerSel.tipo}; renderSection(); }
  else if(act==="t-disc-change"){ UI.timerSel.disciplinaId=t.value; UI.timerSel.assuntoId=""; renderSection(); }
  else if(act==="t-assunto-change"){ UI.timerSel.assuntoId=t.value; }
  else if(act==="t-tipo-change"){ UI.timerSel.tipo=t.value; }
  else if(act==="tm-concurso-change"){ document.getElementById("tm-disc").innerHTML=discOptions(t.value,""); document.getElementById("tm-assunto").innerHTML=assuntoOptions(t.value,"",""); }
  else if(act==="tm-disc-change"){ const cid=document.getElementById("tm-concurso").value; document.getElementById("tm-assunto").innerHTML=assuntoOptions(cid,t.value,""); }
  else if(act==="q-concurso-change"||act==="eq-concurso-change"){ const did=act==="eq-concurso-change"?"eq-disc-"+t.dataset.id:"q-disc"; const aid=act==="eq-concurso-change"?"eq-assunto-"+t.dataset.id:"q-assunto"; document.getElementById(did).innerHTML=discOptions(t.value,""); document.getElementById(aid).innerHTML=assuntoOptions(t.value,"",""); }
  else if(act==="q-disc-change"){ const cid=document.getElementById("q-concurso").value; document.getElementById("q-assunto").innerHTML=assuntoOptions(cid,t.value,""); }
  else if(act==="sm-concurso-change"||act==="esm-concurso-change"){ const did=act==="esm-concurso-change"?"esm-disc-"+t.dataset.id:"sm-disc"; const aid=act==="esm-concurso-change"?"esm-assunto-"+t.dataset.id:"sm-assunto"; document.getElementById(did).innerHTML=discOptions(t.value,""); document.getElementById(aid).innerHTML=assuntoOptions(t.value,"",""); }
  else if(act==="ds-concurso-change"||act==="eds-concurso-change"){ const did=act==="eds-concurso-change"?"eds-disc-"+t.dataset.id:"ds-disc"; const aid=act==="eds-concurso-change"?"eds-assunto-"+t.dataset.id:"ds-assunto"; document.getElementById(did).innerHTML=discOptions(t.value,""); document.getElementById(aid).innerHTML=assuntoOptions(t.value,"",""); }
  else if(act==="ds-disc-change"){ const cid=document.getElementById("ds-concurso").value; document.getElementById("ds-assunto").innerHTML=assuntoOptions(cid,t.value,""); }
  else if(act==="j-concurso-change"||act==="ej-concurso-change"){ const did=act==="ej-concurso-change"?"ej-disc-"+t.dataset.id:"j-disc"; document.getElementById(did).innerHTML=discOptions(t.value,""); }
  else if(act==="l-concurso-change"||act==="el-concurso-change"){ const did=act==="el-concurso-change"?"el-disc-"+t.dataset.id:"l-disc"; document.getElementById(did).innerHTML=discOptions(t.value,""); }
  else if(act==="cad-concurso-change"){ document.getElementById("cad-disc").innerHTML=discOptions(t.value,""); }
  else if(act==="fc-concurso-change"||act==="ef-concurso-change"){ const did=act==="ef-concurso-change"?"ef-disc-"+t.dataset.id:"fc-disc"; const aid=act==="ef-concurso-change"?"ef-assunto-"+t.dataset.id:"fc-assunto"; document.getElementById(did).innerHTML=discOptions(t.value,""); document.getElementById(aid).innerHTML=assuntoOptions(t.value,"",""); }
  else if(act==="fc-disc-change"){ const cid=document.getElementById("fc-concurso").value; document.getElementById("fc-assunto").innerHTML=assuntoOptions(cid,t.value,""); }
  else if(act==="er-concurso-change"){ document.getElementById("er-disc-"+t.dataset.id).innerHTML=discOptions(t.value,""); document.getElementById("er-assunto-"+t.dataset.id).innerHTML=assuntoOptions(t.value,"",""); }
  else if(act==="fc-filter-change"){ UI.fcFilter=t.value; renderSection(); }
  else if(act==="toggle-task"){ const mid=t.dataset.mid, tid=t.dataset.tid; mutate(()=>{ const m=S.metas.find(x=>x.id===mid); const task=(m.tasks||[]).find(x=>x.id===tid); if(task) task.done=t.checked; }); }
  else if(act==="ciclo-prevista"){ const ci=S.ciclo.find(x=>x.id===t.dataset.id); if(ci){ ci.tempoPrevisto=Math.max(1,Number(t.value)||1); ci.status= ci.tempoExecutado<=0?"não iniciado": ci.tempoExecutado>=ci.tempoPrevisto?"concluído":"em andamento"; mutateSilent(()=>{}); renderSection(); } }
  else if(act==="ciclo-executado"){ const ci=S.ciclo.find(x=>x.id===t.dataset.id); if(ci){ ci.tempoExecutado=Math.max(0,Number(t.value)||0); ci.status= ci.tempoExecutado<=0?"não iniciado": ci.tempoExecutado>=ci.tempoPrevisto?"concluído":"em andamento"; mutateSilent(()=>{}); renderSection(); } }
  else if(act==="revisao-data"){ const r=S.revisoes.find(x=>x.id===t.dataset.id); if(r){ r.dataPrevista=t.value; mutateSilent(()=>{}); renderSection(); } }
  else if(t.id==="horas-semanais"){ const novo=Math.max(1,Number(t.value)||1); mutate(()=>{ recalcularHoras(novo); }); }
  else if(t.id==="import-file"){ importData(t.files[0]); }
});
document.addEventListener("input",(e)=>{
  if(!S) return;
  const t=e.target.closest("[data-act]"); if(!t) return;
  const act=t.dataset.act;
  if(act==="caderno-texto"){ const c=S.cadernos.find(x=>x.id===t.dataset.id); c.conteudo=t.value; scheduleSave(); }
  else if(act==="caderno-titulo"){ const c=S.cadernos.find(x=>x.id===t.dataset.id); c.titulo=t.value; scheduleSave(); }
  else if(act==="postit-texto"){ const p=S.postits.find(x=>x.id===t.dataset.id); p.texto=t.value; scheduleSave(); }
  else if(act==="table-cell"){ tableCellInput(t); }
});

function colorPickAction(group,id,color){
  if(group==="caderno-cor"){ mutate(()=>{ S.cadernos.find(x=>x.id===id).corTexto=color; }); }
  else if(group==="postit-cor"){ mutate(()=>{ S.postits.find(x=>x.id===id).corTexto=color; }); }
  else if(group==="pi-texto-cor"){ UI.piCorTexto=color; renderSection(); }
  else if(group==="fc-cor"){ UI.fcCorTexto=color; renderSection(); }
}
function tableOp(t,op,idx){
  const group=t.dataset.group, id=t.dataset.id;
  if(group==="fc"){
    let tab=UI.fcTabela; if(!tab) return;
    if(op==="addrow") tab.push(tab[0].map(()=>"")); else if(op==="addcol") tab.forEach(r=>r.push(""));
    else if(op==="delrow"&&tab.length>1) tab.splice(idx,1); else if(op==="delcol"&&tab[0].length>1) tab.forEach(r=>r.splice(idx,1));
    renderSection(); return;
  }
  const obj = group==="caderno"? S.cadernos.find(x=>x.id===id) : group==="postit"? S.postits.find(x=>x.id===id) : null;
  if(!obj||!obj.tabela) return;
  let tab=obj.tabela;
  if(op==="addrow") tab.push(tab[0].map(()=>""));
  else if(op==="addcol") tab.forEach(r=>r.push(""));
  else if(op==="delrow"&&tab.length>1) tab.splice(idx,1);
  else if(op==="delcol"&&tab[0].length>1) tab.forEach(r=>r.splice(idx,1));
  mutate(()=>{});
}
function tableCellInput(t){
  const group=t.dataset.group, id=t.dataset.id, r=Number(t.dataset.r), c=Number(t.dataset.c);
  if(group==="fc"){ if(UI.fcTabela) UI.fcTabela[r][c]=t.value; return; }
  const obj = group==="caderno"? S.cadernos.find(x=>x.id===id) : group==="postit"? S.postits.find(x=>x.id===id) : null;
  if(obj&&obj.tabela){ obj.tabela[r][c]=t.value; scheduleSave(); }
}

/* ============ TIMER ============ */
function startTimerInterval(){ stopTimerInterval(); timerInterval=setInterval(tickTimer,1000); }
function stopTimerInterval(){ if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }
function stopTimerStop(){
  UI.timerRunning=false; stopTimerInterval();
  if(UI.timerElapsed>=5){
    const sel={...UI.timerSel};
    mutate(()=>{
      S.registros.push({id:uid(),...sel,duracao:UI.timerElapsed,ts:new Date().toISOString()});
      applyEstudoEffects(sel,UI.timerElapsed);
    });
  } else { renderSection(); }
  UI.timerElapsed=0;
}

/* ============ EXPORT / IMPORT ============ */
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`estudos-backup-${todayISO()}.json`; a.click();
  URL.revokeObjectURL(url);
}
function importData(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{ const parsed=JSON.parse(reader.result); S=Object.assign(defaultState(),parsed); S.metas.forEach(m=>{ if(!m.tasks) m.tasks=[]; if(!m.periodo) m.periodo="semanal"; }); render(); }
    catch(e){}
  };
  reader.readAsText(file);
}

/* ============ INIT ============ */
(async function init(){
  await loadAuth();
  renderLogin();
})();
</script>
